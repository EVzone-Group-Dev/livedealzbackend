name: Deploy Backend

on:
  push:
    branches: [ main ]

# Prevent concurrent deployments
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

# Define permissions for security best practices
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run tests
        run: npm run test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Deploy to DigitalOcean Droplet
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          script_stop: false
          script: |
            echo "========================================"
            echo "=== Deployment Started at $(date) ==="
            echo "========================================"
            echo "Current directory: $(pwd)"
            echo "Current user: $(whoami)"
            echo "Hostname: $(hostname)"
            echo ""
            
            # Check if directory exists, create if not
            if [ ! -d "/var/www/livedealzbackend" ]; then
              echo "[INFO] Directory /var/www/livedealzbackend does not exist, creating..."
              mkdir -p /var/www/livedealzbackend
              chown -R root:root /var/www/livedealzbackend
              chmod 755 /var/www/livedealzbackend
              echo "[INFO] Directory created successfully"
            fi
            
            cd /var/www/livedealzbackend
            echo "[INFO] Changed to directory: $(pwd)"
            
            # Check if git repo exists, clone if not (using HTTPS for public repo)
            if [ ! -d ".git" ]; then
              echo "[INFO] No git repository found, cloning via HTTPS..."
              git clone https://github.com/EVzone-Group-Dev/livedealzbackend.git .
              echo "[INFO] Repository cloned successfully"
            else
              echo "[INFO] Git repository found, pulling latest changes..."
              git fetch origin main
              git reset --hard origin/main
              git clean -fd -e ecosystem.config.js -e .env -e .env.* || true
            fi
            
            # Ensure Node.js 20+ is installed
            echo "[INFO] Checking Node.js version..."
            CURRENT_NODE=$(node --version 2>/dev/null || echo "none")
            echo "[INFO] Current Node.js version: $CURRENT_NODE"
            
            NODE_MAJOR=$(node --version 2>/dev/null | sed 's/v//' | cut -d. -f1)
            if [ -z "$NODE_MAJOR" ] || [ "$NODE_MAJOR" -lt 20 ] 2>/dev/null; then
              echo "[INFO] Node.js version is $CURRENT_NODE, upgrading to Node.js 20..."
              
              # Update apt and install prerequisites
              export DEBIAN_FRONTEND=noninteractive
              apt-get update -y
              apt-get install -y ca-certificates curl gnupg
              
              # Install NodeSource repository
              mkdir -p /etc/apt/keyrings
              curl -fsSL https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key | gpg --dearmor -o /etc/apt/keyrings/nodesource.gpg
              echo "deb [signed-by=/etc/apt/keyrings/nodesource.gpg] https://deb.nodesource.com/node_20.x nodistro main" | tee /etc/apt/sources.list.d/nodesource.list
              
              # Install/upgrade Node.js
              apt-get update -y
              apt-get install -y nodejs
              
              NEW_NODE=$(node --version)
              echo "[INFO] Node.js upgraded to $NEW_NODE"
            else
              echo "[INFO] Node.js version is $CURRENT_NODE - OK"
            fi
            
            # Ensure npm is up to date
            echo "[INFO] Checking npm version..."
            npm install -g npm@latest || true
            echo "[INFO] npm version: $(npm --version)"
            
            # Ensure pm2 exists
            echo "[INFO] Checking PM2 installation..."
            if command -v pm2 >/dev/null 2>&1; then
              echo "[INFO] PM2 is installed: $(pm2 --version)"
            else
              echo "[INFO] PM2 not found, installing..."
              npm install -g pm2
              echo "[INFO] PM2 installed: $(pm2 --version)"
            fi
            
            # Backup server-specific files (important!)
            echo "[INFO] Backing up server-specific files..."
            if [ -f ecosystem.config.js ]; then
              cp ecosystem.config.js /tmp/ecosystem.config.js
              echo "[INFO] Backed up ecosystem.config.js"
            else
              echo "[INFO] No ecosystem.config.js to backup"
            fi
            
            if [ -f .env ]; then
              cp .env /tmp/livedealzbackend.env
              echo "[INFO] Backed up .env"
            else
              echo "[INFO] No .env to backup"
            fi
            
            # Ignore ecosystem locally so it never blocks pulls
            if ! grep -qxF "ecosystem.config.js" .git/info/exclude 2>/dev/null; then
              echo "ecosystem.config.js" >> .git/info/exclude
              echo "[INFO] Added ecosystem.config.js to .git/info/exclude"
            else
              echo "[INFO] ecosystem.config.js already in .git/info/exclude"
            fi
            
            # Install deps without rewriting package-lock.json
            echo "[INFO] Installing dependencies..."
            npm ci --legacy-peer-deps
            echo "[INFO] Dependencies installed successfully"
            
            # Generate Prisma client
            echo "[INFO] Generating Prisma client..."
            npx prisma generate
            echo "[INFO] Prisma client generated"
            
            # Build application with increased memory
            echo "[INFO] Building application..."
            export NODE_OPTIONS="--max-old-space-size=4096"
            npm run build
            echo "[INFO] Build completed successfully"
            
            # Verify build output
            if [ -d "dist" ]; then
              echo "[INFO] Build output verified: dist/ directory exists"
              ls -la dist/
            else
              echo "[ERROR] Build output not found!"
              exit 1
            fi
            
            # Reload using ecosystem config (recommended)
            echo "[INFO] Starting/reloading application with PM2..."
            if [ -f ecosystem.config.js ]; then
              echo "[INFO] Using ecosystem.config.js"
              pm2 startOrReload ecosystem.config.js --update-env
            else
              echo "[INFO] No ecosystem.config.js found, using direct command"
              pm2 restart api || pm2 start dist/main.js --name api --update-env
            fi
            
            # Check PM2 status
            echo "[INFO] PM2 Status:"
            pm2 status
            
            echo ""
            echo "========================================"
            echo "=== Deployment Completed Successfully at $(date) ==="
            echo "========================================"
